<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login - G-SAVE</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body class="login-page">

<section class="login-wrap">

<div class="login-card">

<div class="login-logo">
<img src="images/logo.png" alt="logo">
</div>

<div class="login-brand">
<h1>G-SAVE</h1>
<p>Secure Investment Wallet</p>
</div>

<div class="login-text">
<h2>Welcome Back</h2>

<p>
Login with your Google account to access your dashboard,
manage deposits, buy CYT, invest, and withdraw earnings.
</p>
</div>

<button class="google-login-btn" onclick="googleLogin()">
<i class="fa-brands fa-google"></i>
 Continue with Google
</button>

<div class="mini-note">
Protected by secure authentication.
</div>

<div class="back-home">
<a href="index.html">
<i class="fa-solid fa-arrow-left"></i>
 Back to Home
</a>
</div>

</div>

</section>

<script src="js/auth.js"></script>
</body>
</html>
