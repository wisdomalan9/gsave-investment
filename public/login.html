<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - G-Save Investment</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<style>
.logo img {
    width: 32px;
    border-radius: 8px; /* 🔥 smooth look */
}

.login-logo {
    width: 70px;
    border-radius: 12px;
}
</style>

<section class="login">

    <div class="login-box">

        <img src="images/ant.png" class="login-logo">

        <h2>Welcome Back</h2>

        <p>
            Sign in to access your dashboard, manage your wallet, convert funds into CYT, 
            and continue your investment activities.
        </p>

        <button onclick="googleLogin()" class="google-btn">
            Continue with Google
        </button>

        <!-- OPTIONAL EXTRA INFO -->
        <div style="margin-top:15px; font-size:12px; color:#777;">
            By continuing, you agree to use this platform as your investment environment.
        </div>

    </div>

</section>

<!-- ✅ FIXED FIREBASE SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="js/auth.js"></script>

</html>
