<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>G-SAVE ADMIN PANEL</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

.topbar{
background:linear-gradient(135deg,#1e293b,#0f172a);
padding:18px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.topbar h1{
font-size:20px;
}

.logout{
background:#ef4444;
border:none;
padding:10px 16px;
border-radius:10px;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.card h3{
font-size:14px;
opacity:.8;
margin-bottom:10px;
}

.card h2{
font-size:28px;
}

.search{
margin-bottom:20px;
display:flex;
gap:10px;
}

.search input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
}

.search button{
padding:14px 18px;
border:none;
background:#2563eb;
color:#fff;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.table-box{
background:#1e293b;
border-radius:18px;
padding:15px;
overflow:auto;
box-shadow:0 8px 25px rgba(0,0,0,.25);
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:14px;
}

th{
color:#60a5fa;
}

.action-btn{
padding:8px 12px;
border:none;
border-radius:8px;
font-size:12px;
font-weight:bold;
cursor:pointer;
margin:2px;
}

.green{background:#16a34a;color:#fff;}
.red{background:#dc2626;color:#fff;}
.blue{background:#2563eb;color:#fff;}

.popup{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
padding:14px 18px;
border-radius:12px;
font-weight:bold;
opacity:0;
transform:translateY(-20px);
transition:.3s;
z-index:999;
}

.popup.show{
opacity:1;
transform:translateY(0);
}

@media(max-width:768px){
.topbar{
flex-direction:column;
gap:12px;
align-items:flex-start;
}
}
</style></head><body><div class="popup" id="popup">Success</div><div class="topbar">
<h1><i class="fa-solid fa-shield-halved"></i> G-SAVE ADMIN PANEL</h1>
<button class="logout" onclick="logoutAdmin()">Logout</button>
</div><div class="grid">
<div class="card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div><div class="card">
<h3>Total Balances</h3>
<h2 id="totalBalance">₱0</h2>
</div><div class="card">
<h3>Total CYT</h3>
<h2 id="totalCYT">0</h2>
</div><div class="card">
<h3>Active Users</h3>
<h2 id="activeUsers">0</h2>
</div>
</div><div class="search">
<input type="text" id="searchEmail" placeholder="Search user email...">
<button onclick="searchUser()"><i class="fa fa-search"></i> Search</button>
<button onclick="loadUsers()"><i class="fa fa-rotate"></i> Refresh</button>
</div><div class="table-box">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Balance</th>
<th>CYT</th>
<th>Investments</th>
<th>Actions</th>
</tr>
</thead><tbody id="userTable">
<tr>
<td colspan="6">Loading users...</td>
</tr>
</tbody>
</table>
</div><script src="admin.js"></script></body>
</html>
