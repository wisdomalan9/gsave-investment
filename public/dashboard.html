<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Save Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body onload="showSection('invest')">
<!-- 🔵 HEADER -->
<div class="header">
    <div class="logo-box">
        <img src="images/ant.png" class="logo">
        <div>
            <h2>G-Save</h2>
            <small>Investment Dashboard</small>
        </div>
    </div>

    <div class="user-box">
        <h4 id="userName">User</h4>
        <small id="userEmail"></small>
        <button onclick="refreshAccount()">⟳</button>
    </div>
</div>

<!-- 💰 BALANCE -->
<div class="balance-card">
    <h1 id="balance">₱0</h1>
    <p id="cytBalance">CYT: 0</p>
    <p id="withdrawable">Withdrawable: ₱0</p>
</div>

<!-- ⚡ ACTIONS -->
<div class="actions">
    <input type="number" id="depositAmount" placeholder="Deposit amount">
    <button onclick="requestDeposit()">Deposit</button>

    <input type="number" id="amount" placeholder="Buy CYT amount">
    <button onclick="buyCYT()">Buy CYT</button>

    <div class="row">
        <button onclick="showSection('invest')">Invest</button>
        <button onclick="withdrawAll()">Withdraw</button>
    </div>
</div>

<!-- 📊 STATS -->
<div class="stats">
    <div class="stat-box">
        <p>Invested</p>
        <h3 id="totalInvested">0</h3>
    </div>

    <div class="stat-box">
        <p>Profit</p>
        <h3 id="totalProfit">0</h3>
    </div>

    <div class="stat-box">
        <p>Active</p>
        <h3 id="activeCount">0</h3>
    </div>
<div class="card">
    <h3>Performance Chart</h3>
    <canvas id="profitChart"></canvas>
</div>

</div>

<!-- 🔥 ACTIVITY -->
<div class="card">
    <h3>Live Activity</h3>
    <ul id="activityFeed"></ul>
</div>

<!-- 📈 INVEST -->
<div id="investSection" class="section">

    <div class="card">
        <h3>Start Investment</h3>
        <input type="number" id="investAmount" placeholder="Enter CYT">

        <select id="plan">
            <option value="3">3 Days (50%)</option>
            <option value="7">7 Days (70%)</option>
            <option value="9">9 Days (90%)</option>
            <option value="14">14 Days (120%)</option>
            <option value="30">30 Days (300%)</option>
        </select>

        <button onclick="invest()">Invest Now</button>
    </div>

    <div class="card">
        <h3>Your Investments</h3>
        <ul id="investmentList"></ul>
    </div>

</div>

<!-- 📜 HISTORY -->
<div id="historySection" class="section">
    <div class="card">
        <h3>Transaction History</h3>
        <ul id="historyList"></ul>
    </div>
</div>

<!-- POPUPS -->
<div id="popup" class="popup"></div>
<div id="receipt" class="receipt"></div>

<!-- 🔻 BOTTOM NAV -->
<div class="bottom-nav">
    <button onclick="showSection('')">🏠</button>
    <button onclick="showSection('invest')">📈</button>
    <button onclick="showSection('history')">📜</button>
    <button onclick="logout()">🚪</button>
</div>

<script>
function showSection(section) {

    document.querySelectorAll(".section").forEach(sec => {
        sec.style.opacity = 0;

        setTimeout(() => {
            sec.style.display = "none";
        }, 200);
    });

    let target = null;

    if (section === "invest") target = document.getElementById("investSection");
    if (section === "history") target = document.getElementById("historySection");

    if (target) {
        target.style.display = "block";

        setTimeout(() => {
            target.style.opacity = 1;
        }, 50);
    }
}
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
