<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Save Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="layout">

    <!-- 🧭 SIDEBAR -->
    <div class="sidebar">
        <div class="logo-box">
            <img src="images/ant.png" class="logo">
            <h2>G-Save</h2>
        </div>

        <nav>
            <button onclick="showSection('home')">🏠 Dashboard</button>
            <button onclick="showSection('invest')">📈 Invest</button>
            <button onclick="showSection('history')">📜 History</button>
            <button onclick="logout()">🚪 Logout</button>
        </nav>
    </div>

    <!-- 📊 MAIN CONTENT -->
    <div class="main">

        <!-- 🔵 TOP BAR -->
        <div class="topbar">
            <div>
                <h3 id="userName">User</h3>
                <small id="userEmail"></small>
            </div>

            <button onclick="refreshAccount()" class="refresh-btn">⟳</button>
        </div>

        <!-- 💰 WALLET -->
        <div class="wallet">
            <div>
                <p>Available Balance</p>
                <h1 id="balance">₱0</h1>
            </div>

            <div class="wallet-side">
                <p id="cytBalance">CYT: 0</p>
                <p id="withdrawable">Withdrawable: ₱0</p>
            </div>
        </div>

        <!-- ⚡ ACTIONS -->
        <div class="actions">
            <button onclick="requestDeposit()">Deposit</button>
            <button onclick="buyCYT()">Buy CYT</button>
            <button onclick="showSection('invest')">Invest</button>
            <button onclick="withdrawAll()">Withdraw</button>
        </div>

        <!-- 📊 STATS -->
        <div class="stats">
            <div class="stat">
                <p>Invested</p>
                <h3 id="totalInvested">0</h3>
            </div>

            <div class="stat">
                <p>Profit</p>
                <h3 id="totalProfit">0</h3>
            </div>

            <div class="stat">
                <p>Active</p>
                <h3 id="activeCount">0</h3>
            </div>
        </div>

        <!-- 🔥 ACTIVITY -->
        <ul id="activityFeed"></ul>

        <!-- 📊 HOME -->
        <div id="homeSection" class="section active"></div>

        <!-- 📈 INVEST -->
        <div id="investSection" class="section">

            <div class="card">
                <h3>Invest</h3>
                <input type="number" id="investAmount" placeholder="Enter CYT">

                <select id="plan">
                    <option value="3">3 Days (50%)</option>
                    <option value="7">7 Days (70%)</option>
                    <option value="9">9 Days (90%)</option>
                    <option value="14">14 Days (120%)</option>
                    <option value="30">30 Days (300%)</option>
                </select>

                <button onclick="invest()">Start Investment</button>
            </div>

            <div class="card">
                <h3>Investments</h3>
                <ul id="investmentList"></ul>
            </div>

        </div>

        <!-- 📜 HISTORY -->
        <div id="historySection" class="section">
            <div class="card">
                <h3>History</h3>
                <ul id="historyList"></ul>
            </div>
        </div>

    </div>

</div>

<!-- POPUPS -->
<div id="popup" class="popup"></div>
<div id="receipt" class="receipt"></div>

<script>
function showSection(section) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));

    if (section === "home") document.getElementById("homeSection").classList.add("active");
    if (section === "invest") document.getElementById("investSection").classList.add("active");
    if (section === "history") document.getElementById("historySection").classList.add("active");
}
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
