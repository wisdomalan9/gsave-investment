<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Save Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🔵 HEADER -->
<header class="header">
    <div class="logo-box">
        <img src="images/ant.png" class="logo">
        <div>
            <h2>G-Save</h2>
            <small>Investment Dashboard</small>
        </div>
    </div>

    <div class="user-box">
        <h4 id="userName">User</h4>
        <small id="userEmail"></small>
        <button onclick="refreshAccount()">⟳</button>
    </div>
</header>

<!-- 💰 BALANCE -->
<section class="balance-card">
    <h1 id="balance">₱0</h1>
    <p id="cytBalance">CYT: 0</p>
    <p id="withdrawable">Withdrawable: ₱0</p>
</section>

<!-- ⚡ ACTIONS -->
<section class="actions">

    <div class="action-group">
        <input type="number" id="depositAmount" placeholder="Deposit amount">
        <button onclick="requestDeposit()">Deposit</button>
    </div>

    <div class="action-group">
        <input type="number" id="amount" placeholder="Buy CYT amount">
        <button onclick="buyCYT()">Buy CYT</button>
    </div>

    <div class="row">
        <button onclick="navigate('invest', document.querySelectorAll('.nav-btn')[1])">Invest</button>
        <button onclick="withdrawAll()">Withdraw</button>
    </div>

</section>

<!-- 📊 STATS -->
<section class="stats">

    <div class="stat-box">
        <p>Invested</p>
        <h3 id="totalInvested">0</h3>
    </div>

    <div class="stat-box">
        <p>Profit</p>
        <h3 id="totalProfit">0</h3>
    </div>

    <div class="stat-box">
        <p>Active</p>
        <h3 id="activeCount">0</h3>
    </div>

</section>

<!-- 📊 PERFORMANCE CHART -->
<section class="card home-section">
    <h3>Performance Chart</h3>
    <canvas id="profitChart"></canvas>
</section>

<!-- 🔥 ACTIVITY -->
<section class="card home-section">
    <h3>Live Activity</h3>
    <ul id="activityFeed"></ul>
</section>

<!-- 📈 INVEST SECTION -->
<section id="investSection" class="section">

    <div class="card">
        <h3>Start Investment</h3>

<select id="planSelect"></select>
<button onclick="invest()">Invest Now</button>
            <option value="3">3 Days (50%)</option>
            <option value="7">7 Days (70%)</option>
            <option value="9">9 Days (90%)</option>
            <option value="14">14 Days (120%)</option>
            <option value="30">30 Days (300%)</option>
        </select>

        <button onclick="invest()">Invest Now</button>
    </div>

    <div class="card">
        <h3>Your Investments</h3>
        <ul id="investmentList"></ul>
    </div>

</section>

<!-- 📜 HISTORY -->
<section id="historySection" class="section">
    <div class="card">
        <h3>Transaction History</h3>
        <ul id="historyList"></ul>
    </div>
</section>

<!-- 🔔 POPUPS -->
<div id="popup" class="popup"></div>
<div id="receipt" class="receipt"></div>

<!-- 🔻 BOTTOM NAV -->
<nav class="bottom-nav">
    <div class="nav-indicator" id="navIndicator"></div>

    <button onclick="navigate('home', this)" class="nav-btn active">🏠</button>
    <button onclick="navigate('invest', this)" class="nav-btn">📈</button>
    <button onclick="navigate('history', this)" class="nav-btn">📜</button>
    <button onclick="logout()" class="nav-btn">🚪</button>
</nav>

<!-- 🔄 SECTION SWITCH SCRIPT -->
<script>
function navigate(section, btn) {

    const sections = document.querySelectorAll(".section");
    const buttons = document.querySelectorAll(".nav-btn");
    const indicator = document.getElementById("navIndicator");

    // ACTIVE BUTTON
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    // MOVE INDICATOR
    const index = Array.from(buttons).indexOf(btn);
    indicator.style.transform = `translateX(${index * 100}%)`;

    // HIDE ALL SECTIONS
    sections.forEach(sec => {
        sec.style.display = "none";
        sec.style.opacity = "0";
    });

    // MAIN DASHBOARD ELEMENTS
    const main = document.querySelectorAll(
        ".balance-card, .actions, .stats, .home-section"
    );

    // 🏠 HOME
    if (section === "home") {
        main.forEach(el => el.style.display = "block");
        return;
    }

    // HIDE HOME
    main.forEach(el => el.style.display = "none");

    // 📈 INVEST
    if (section === "invest") {
        const el = document.getElementById("investSection");
        el.style.display = "block";
        el.style.opacity = "1";

        window.scrollTo({ top: el.offsetTop - 20, behavior: "smooth" });
    }

    // 📜 HISTORY
    if (section === "history") {
        const el = document.getElementById("historySection");
        el.style.display = "block";
        el.style.opacity = "1";

        window.scrollTo({ top: el.offsetTop - 20, behavior: "smooth" });
    }
}
</script>
<!-- 🔥 SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
