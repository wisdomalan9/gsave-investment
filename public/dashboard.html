<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - G-Save Investment</title>

<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>G-Save</h2>

        <ul>
<li onclick="window.scrollTo(0,0)">Dashboard</li>
<li onclick="document.getElementById('depositSection').scrollIntoView()">Deposit</li>
<li onclick="document.getElementById('investSection').scrollIntoView()">Invest</li>
<li onclick="document.getElementById('investmentList').scrollIntoView()">Withdraw</li>
<li onclick="logout()">Logout</li>
        </ul>
</div>
    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <div>
                <h2>Dashboard</h2>
                <p id="userName"></p>
                <small id="userEmail"></small>
            </div>
        </div>

        <!-- WALLET -->
        <div class="card wallet">
            <h3>Wallet Balance</h3>
            <h1 id="balance">₱0</h1>
            <p id="cytBalance">CYT Balance: 0</p>
<button onclick="refreshAccount()" class="btn">Refresh Account</button>
        </div>

        <!-- ANALYTICS -->
        <div class="analytics">
            <div class="card small">
                <p>Total Invested</p>
                <h3 id="totalInvested">0</h3>
            </div>

            <div class="card small">
                <p>Total Profit</p>
                <h3 id="totalProfit">0</h3>
            </div>

            <div class="card small">
                <p>Active</p>
                <h3 id="activeCount">0</h3>
            </div>
        </div>

        <!-- DEPOSIT -->
<div class="card" id="depositSection">
            <h3>Deposit Funds</h3>

            <input type="number" id="depositAmount" placeholder="Enter amount in ₱">

            <button onclick="requestDeposit()" class="btn">Request Deposit</button>
        </div>

        <!-- BUY CYT -->
        <div class="card">
            <h3>Buy CyberToken (CYT)</h3>

            <input type="number" id="amount" placeholder="Enter amount in ₱">

            <button onclick="buyCYT()" class="btn">Buy CYT</button>

        </div>

        <!-- INVEST -->
        <div class="card" id="investSection">
            <h3>Invest CYT</h3>

            <input type="number" id="investAmount" placeholder="Enter CYT amount">

            <select id="plan">
                <optgroup label="Weekly Plans">
                    <option value="7">7 Days (30%)</option>
                    <option value="14">14 Days (60%)</option>
                    <option value="21">21 Days (90%)</option>
                </optgroup>

                <optgroup label="Monthly Plans">
                    <option value="30">1 Month (95%)</option>
                    <option value="60">2 Months (150%)</option>
                    <option value="90">3 Months (200%)</option>
                </optgroup>
            </select>

            <button onclick="invest()" class="btn">Start Investment</button>
        </div>

        <!-- INVESTMENTS -->
        <div class="card">
            <h3>Active Investments</h3>
            <ul id="investmentList"></ul>
        </div>

        <!-- HISTORY -->
        <div class="card">
            <h3>Transaction History</h3>
            <ul id="historyList"></ul>
        </div>

    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
