<!-- FILE: public/dashboard.html (PRODUCTION STABLE VERSION) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>G-SAVE Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* SAFETY LAYER (prevents invisible UI failures) */
.hidden { display:none !important; }
.error-fallback {
  padding:10px;
  background:#dc2626;
  color:#fff;
  font-size:12px;
}
</style>

</head>

<body>

<!-- SAFE ERROR GUARD -->
<div id="errorBox" class="error-fallback hidden"></div>

<!-- TOAST -->
<div id="popup" class="popup">Success</div>

<!-- RECEIPT -->
<div id="receipt" class="receipt hidden">
  <div class="receipt-box" id="receiptBox"></div>
</div>

<!-- HEADER -->
<header class="top-header">

  <div class="header-row">
    <div class="brand">
      <img src="images/logo.png" alt="logo">
      <div>
        <h1>G-SAVE</h1>
        <small>Investment Wallet</small>
      </div>
    </div>

    <button class="icon-btn" onclick="safeLogout()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <div class="wallet-card">
    <p>Available Peso Balance</p>
    <h2 id="balance">₱0.00</h2>

    <div class="wallet-mini">
      <div>
        <span>CYT Balance</span>
        <strong id="cytBalance">0.000000</strong>
      </div>

      <div>
        <span>Withdrawable</span>
        <strong id="withdrawable">₱0.00</strong>
      </div>
    </div>

    <small id="userEmail">Loading...</small>
  </div>

</header>

<!-- ACTIONS -->
<section class="actions-grid">

  <button class="action-card" onclick="safeOpen('depositModal')">
    <i class="fa-solid fa-wallet"></i>
    <span>Deposit</span>
  </button>

  <button class="action-card" onclick="safeOpen('buyModal')">
    <i class="fa-solid fa-coins"></i>
    <span>Buy CYT</span>
  </button>

  <button class="action-card" onclick="safeOpen('investModal')">
    <i class="fa-solid fa-chart-line"></i>
    <span>Invest</span>
  </button>

  <button class="action-card" onclick="safeOpen('withdrawModal')">
    <i class="fa-solid fa-money-bill-transfer"></i>
    <span>Withdraw</span>
  </button>

</section>

<!-- CHART -->
<section class="card">
  <div class="card-head"><h3>Live Growth</h3></div>
  <canvas id="profitChart"></canvas>
</section>

<!-- INVESTMENTS -->
<section class="card">
  <div class="card-head"><h3>My Investments</h3></div>
  <div id="investmentList" class="stack-list"></div>
</section>

<!-- HISTORY -->
<section class="card">
  <div class="card-head"><h3>Transaction History</h3></div>
  <div id="historyList" class="stack-list"></div>
</section>

<!-- FEED -->
<section class="card">
  <div class="card-head"><h3>Live Activity</h3></div>
  <div id="activityFeed" class="stack-list feed-list"></div>
</section>

<div class="bottom-space"></div>

<!-- ================= MODALS ================= -->

<div class="modal hidden" id="depositModal">
  <div class="modal-sheet">
    <h3>Deposit</h3>

    <input id="depositAmount" type="number" placeholder="Minimum ₱1,000">
    <select id="depositMethod">
      <option>Bank Transfer</option>
      <option>USDT</option>
      <option>Other</option>
    </select>

    <button onclick="safeDeposit()">Next</button>
    <button onclick="safeClose()">Cancel</button>
  </div>
</div>

<div class="modal hidden" id="withdrawModal">
  <div class="modal-sheet">
    <h3>Withdraw</h3>

    <input id="withdrawAmount" type="number" placeholder="Amount">
    <input id="bankName" placeholder="Bank Name">
    <input id="accountNumber" placeholder="Account Number">
    <input id="accountName" placeholder="Account Name">

    <button onclick="safeWithdraw()">Next</button>
    <button onclick="safeClose()">Cancel</button>
  </div>
</div>

<div class="modal hidden" id="buyModal">
  <div class="modal-sheet">
    <h3>Buy CYT</h3>

    <input id="buyAmount" type="number" placeholder="Amount">

    <button onclick="safeBuy()">Buy</button>
    <button onclick="safeClose()">Cancel</button>
  </div>
</div>

<div class="modal hidden" id="investModal">
  <div class="modal-sheet">
    <h3>Invest</h3>

    <select id="planSelect"></select>

    <button onclick="safeInvest()">Start</button>
    <button onclick="safeClose()">Cancel</button>
  </div>
</div>

<!-- CORE JS -->
<script src="js/dashboard.js"></script>

<!-- ================= SAFETY WRAPPER ================= -->
<script>
/* GLOBAL SAFETY LAYER */
window.onerror = function(msg){
  const box = document.getElementById("errorBox");
  if(box){
    box.innerText = "System error detected. Check console.";
    box.classList.remove("hidden");
  }
  console.error(msg);
};

/* SAFE MODAL */
function safeOpen(id){
  try{
    const el = document.getElementById(id);
    if(el) el.classList.remove("hidden");
  }catch(e){}
}

function safeClose(){
  document.querySelectorAll(".modal").forEach(m=>{
    m.classList.add("hidden");
  });
}

/* SAFE ACTION HOOKS (prevents crash breaking UI) */
function safeDeposit(){ try{ depositNext(); }catch(e){console.error(e);} }
function safeWithdraw(){ try{ withdrawNext(); }catch(e){console.error(e);} }
function safeBuy(){ try{ buyCYT(); }catch(e){console.error(e);} }
function safeInvest(){ try{ invest(); }catch(e){console.error(e);} }

/* LOGOUT SAFE */
function safeLogout(){
  try{
    firebase.auth().signOut().then(()=>{
      window.location.href="login.html";
    });
  }catch(e){
    window.location.href="login.html";
  }
}

function closeReceipt(){
  const r = document.getElementById("receipt");
  if(r) r.classList.add("hidden");
}
</script>

</body>
</html>
