<!-- FILE: public/dashboard.html (UPDATED PHASE 2) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>G-SAVE Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- TOAST -->
<div id="popup" class="popup">Success</div>

<!-- RECEIPT MODAL -->
<div id="receipt" class="receipt hidden">
  <div class="receipt-box" id="receiptBox"></div>
</div>

<!-- =======================
TOP HEADER (UNCHANGED)
======================= -->
<header class="top-header">

  <div class="header-row">
    <div class="brand">
      <img src="images/logo.png" alt="logo">
      <div>
        <h1>G-SAVE</h1>
        <small>Investment Wallet</small>
      </div>
    </div>

    <button class="icon-btn" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <div class="wallet-card">
    <p>Available Peso Balance</p>
    <h2 id="balance">₱0.00</h2>

    <div class="wallet-mini">
      <div>
        <span>CYT Balance</span>
        <strong id="cytBalance">0.000000</strong>
      </div>

      <div>
        <span>Withdrawable</span>
        <strong id="withdrawable">₱0.00</strong>
      </div>
    </div>

    <small id="userEmail">Loading...</small>
  </div>

</header>

<!-- =======================
ACTIONS
======================= -->
<section class="actions-grid">

  <button class="action-card" onclick="openModal('depositModal')">
    <i class="fa-solid fa-wallet"></i>
    <span>Deposit</span>
  </button>

  <button class="action-card" onclick="openModal('buyModal')">
    <i class="fa-solid fa-coins"></i>
    <span>Buy CYT</span>
  </button>

  <button class="action-card" onclick="openModal('investModal')">
    <i class="fa-solid fa-chart-line"></i>
    <span>Invest</span>
  </button>

  <!-- UPDATED -->
  <button class="action-card" onclick="openModal('withdrawModal')">
    <i class="fa-solid fa-money-bill-transfer"></i>
    <span>Withdraw</span>
  </button>

</section>

<!-- =======================
PROFIT CHART (UNCHANGED)
======================= -->
<section class="card">
  <div class="card-head">
    <h3>Live Growth</h3>
  </div>
  <canvas id="profitChart"></canvas>
</section>

<!-- =======================
INVESTMENTS (UNCHANGED)
======================= -->
<section class="card">
  <div class="card-head">
    <h3>My Investments</h3>
  </div>
  <div id="investmentList" class="stack-list"></div>
</section>

<!-- =======================
HISTORY (UNCHANGED)
======================= -->
<section class="card">
  <div class="card-head">
    <h3>Transaction History</h3>
  </div>
  <div id="historyList" class="stack-list"></div>
</section>

<!-- =======================
LIVE FEED (UNCHANGED)
======================= -->
<section class="card">
  <div class="card-head">
    <h3>Live Activity</h3>
  </div>
  <div id="activityFeed" class="stack-list feed-list"></div>
</section>

<div class="bottom-space"></div>

<!-- =======================
DEPOSIT MODAL (UPDATED STEP FLOW)
======================= -->
<div class="modal hidden" id="depositModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Deposit (Step 1 → 2)</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <input type="number" id="depositAmount" placeholder="Minimum ₱1,000">

    <select id="depositMethod" style="width:100%;padding:10px;margin-top:10px;">
      <option value="Bank Transfer">Bank Transfer</option>
      <option value="USDT">USDT</option>
      <option value="Other">Other</option>
    </select>

    <button class="primary-btn" onclick="depositNext()">
      Next / View Receipt
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =======================
WITHDRAW MODAL (NEW)
======================= -->
<div class="modal hidden" id="withdrawModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Withdraw (Step 1 → 2)</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <input type="number" id="withdrawAmount" placeholder="Amount (default = full balance)">

    <input type="text" id="bankName" placeholder="Bank Name">

    <input type="text" id="accountNumber" placeholder="Account Number">

    <input type="text" id="accountName" placeholder="Account Name">

    <button class="primary-btn" onclick="withdrawNext()">
      Next / View Receipt
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =======================
BUY CYT MODAL (UNCHANGED)
======================= -->
<div class="modal hidden" id="buyModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Buy Cyber Token</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <input type="number" id="buyAmount" placeholder="Enter Peso Amount">

    <button class="primary-btn" onclick="buyCYT()">
      Buy Now
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =======================
INVEST MODAL (UNCHANGED)
======================= -->
<div class="modal hidden" id="investModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Start Investment</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <select id="planSelect"></select>

    <button class="primary-btn" onclick="invest()">
      Start Now
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =======================
HELPERS (UNCHANGED)
======================= -->
<script>
function openModal(id){
  document.getElementById(id).classList.remove("hidden");
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>{
    m.classList.add("hidden");
  });
}

function closeReceipt(){
  document.getElementById("receipt").classList.add("hidden");
}
</script>

<script src="js/dashboard.js"></script>

</body>
</html>
