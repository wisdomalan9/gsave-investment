<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - G-Save</title>

<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="top">
        <h2>Welcome</h2>
        <p id="userName"></p>
        <small id="userEmail"></small>
    </div>

    <!-- WALLET CARD -->
    <div class="wallet-card">
        <h3>Wallet Balance</h3>
        <h1 id="balance">₱0</h1>
        <p id="cytBalance">CYT: 0</p>

        <button onclick="refreshAccount()" class="btn">Refresh</button>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="actions">

        <div class="action-card">
            <h4>Deposit</h4>
            <input type="number" id="depositAmount" placeholder="₱ Amount">
            <button onclick="requestDeposit()">Send Request</button>
        </div>

        <div class="action-card">
            <h4>Buy CYT</h4>
            <input type="number" id="amount" placeholder="₱ Amount">
            <button onclick="buyCYT()">Buy</button>
        </div>

        <div class="action-card">
            <h4>Invest</h4>
            <input type="number" id="investAmount" placeholder="CYT">
            <select id="plan">
                <option value="7">7 Days</option>
                <option value="14">14 Days</option>
                <option value="30">30 Days</option>
                <option value="60">60 Days</option>
            </select>
            <button onclick="invest()">Start</button>
        </div>

    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="card">
            <p>Invested</p>
            <h3 id="totalInvested">0</h3>
        </div>

        <div class="card">
            <p>Profit</p>
            <h3 id="totalProfit">0</h3>
        </div>

        <div class="card">
            <p>Active</p>
            <h3 id="activeCount">0</h3>
        </div>
    </div>

    <!-- INVESTMENTS -->
    <div class="section">
        <h3>Investments</h3>
        <ul id="investmentList"></ul>
    </div>

    <!-- HISTORY -->
    <div class="section">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>

    <button onclick="logout()" class="logout">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
