<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Save Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <img src="images/ant.png" class="logo">
            <div>
                <h3 id="userName">User</h3>
                <small id="userEmail"></small>
            </div>
        </div>

        <button onclick="refreshAccount()" class="refresh">⟳</button>
    </div>

    <!-- WALLET CARD -->
    <div class="wallet">
        <p>Available Balance</p>
        <h1 id="balance">₱0</h1>
        <p id="cytBalance">CYT: 0</p>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="actions">
        <button onclick="requestDeposit()">Deposit</button>
        <button onclick="buyCYT()">Buy CYT</button>
        <button onclick="document.getElementById('investSection').scrollIntoView()">Invest</button>
    </div>

    <!-- INPUT CARDS -->
    <div class="card">
        <h3>Deposit</h3>
        <input type="number" id="depositAmount" placeholder="Enter amount">
        <button onclick="requestDeposit()">Request Deposit</button>
    </div>

    <div class="card">
        <h3>Buy CYT</h3>
        <input type="number" id="amount" placeholder="Enter amount">
        <button onclick="buyCYT()">Buy Now</button>
    </div>

    <div class="card" id="investSection">
        <h3>Invest</h3>
        <input type="number" id="investAmount" placeholder="Enter CYT">

        <select id="plan">
            <option value="3">3 Days (50%)</option>
            <option value="7">7 Days (70%)</option>
            <option value="9">9 Days (90%)</option>
            <option value="14">14 Days (120%)</option>
            <option value="30">30 Days (300%)</option>
        </select>

        <button onclick="invest()">Start Investment</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div>
            <p>Invested</p>
            <h3 id="totalInvested">0</h3>
        </div>

        <div>
            <p>Profit</p>
            <h3 id="totalProfit">0</h3>
        </div>

        <div>
            <p>Active</p>
            <h3 id="activeCount">0</h3>
        </div>
    </div>

    <!-- INVESTMENTS -->
    <div class="card">
        <h3>Investments</h3>
        <ul id="investmentList"></ul>
    </div>

    <!-- HISTORY -->
    <div class="card">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>

    <button onclick="logout()" class="logout">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
