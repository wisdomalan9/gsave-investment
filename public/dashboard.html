<!-- FILE 1: public/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>G-SAVE Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- TOAST -->
<div id="popup" class="popup">Success</div>

<!-- RECEIPT -->
<div id="receipt" class="receipt hidden">
  <div class="receipt-box" id="receiptBox"></div>
</div>

<!-- TOP HEADER -->
<header class="top-header">

  <div class="header-row">
    <div class="brand">
      <img src="images/logo.png" alt="logo">
      <div>
        <h1>G-SAVE</h1>
        <small>Investment Wallet</small>
      </div>
    </div>

    <button class="icon-btn" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <div class="wallet-card">
    <p>Available Peso Balance</p>
    <h2 id="balance">₱0.00</h2>

    <div class="wallet-mini">

      <div>
        <span>CYT Balance</span>
        <strong id="cytBalance">0.000000</strong>
      </div>

      <div>
        <span>Withdrawable</span>
        <strong id="withdrawable">₱0.00</strong>
      </div>

    </div>

    <small id="userEmail">Loading...</small>
  </div>

</header>

<!-- ACTIONS -->
<section class="actions-grid">

  <button class="action-card" onclick="openModal('depositModal')">
    <i class="fa-solid fa-wallet"></i>
    <span>Deposit</span>
  </button>

  <button class="action-card" onclick="openModal('buyModal')">
    <i class="fa-solid fa-coins"></i>
    <span>Buy CYT</span>
  </button>

  <button class="action-card" onclick="openModal('investModal')">
    <i class="fa-solid fa-chart-line"></i>
    <span>Invest</span>
  </button>

  <button class="action-card" onclick="withdrawAll()">
    <i class="fa-solid fa-money-bill-transfer"></i>
    <span>Withdraw</span>
  </button>

</section>

<!-- PROFIT CHART -->
<section class="card">
  <div class="card-head">
    <h3>Live Growth</h3>
  </div>
  <canvas id="profitChart"></canvas>
</section>

<!-- INVESTMENTS -->
<section class="card">
  <div class="card-head">
    <h3>My Investments</h3>
  </div>
  <div id="investmentList" class="stack-list">
    <div class="empty">No investments yet</div>
  </div>
</section>

<!-- HISTORY -->
<section class="card">
  <div class="card-head">
    <h3>Transaction History</h3>
  </div>
  <div id="historyList" class="stack-list">
    <div class="empty">No transactions yet</div>
  </div>
</section>

<!-- LIVE FEED -->
<section class="card">
  <div class="card-head">
    <h3>Live Activity</h3>
  </div>
  <div id="activityFeed" class="stack-list feed-list">
    <div class="empty">Loading activity...</div>
  </div>
</section>

<div class="bottom-space"></div>

<!-- =========================
DEPOSIT MODAL
========================= -->
<div class="modal hidden" id="depositModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Deposit Peso</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <input
      type="number"
      id="depositAmount"
      placeholder="Minimum ₱1,000"
    >

    <button class="primary-btn" onclick="requestDeposit()">
      Send Request
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =========================
BUY CYT MODAL
========================= -->
<div class="modal hidden" id="buyModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Buy Cyber Token</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <input
      type="number"
      id="buyAmount"
      placeholder="Enter Peso Amount"
    >

    <button class="primary-btn" onclick="buyCYT()">
      Buy Now
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =========================
INVEST MODAL
========================= -->
<div class="modal hidden" id="investModal">
  <div class="modal-sheet">

    <div class="sheet-head">
      <h3>Start Investment</h3>
      <button onclick="closeModal()" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <select id="planSelect"></select>

    <button class="primary-btn" onclick="invest()">
      Start Now
    </button>

    <button class="secondary-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<!-- =========================
HELPER UI
========================= -->
<script>
function openModal(id){
  document.getElementById(id).classList.remove("hidden");
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(modal=>{
    modal.classList.add("hidden");
  });
}

function closeReceipt(){
  document.getElementById("receipt").classList.add("hidden");
}
</script>

<!-- MAIN JS -->
<script src="js/dashboard.js"></script>

</body>
</html>
